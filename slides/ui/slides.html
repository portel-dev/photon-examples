<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slides</title>
  <style id="marp-style"></style>
  <style>
    :root {
      --ai-accent: #67c7ff;
      --bg: #0a0e1a;
      --surface: rgba(15, 20, 35, 0.95);
      --line: rgba(255,255,255,0.1);
      --text: #e5e5e5;
      --muted: rgba(255,255,255,0.45);
      --spring: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      width: 100vw;
    }

    /* ── Marp Viewport ── */

    #marp-container {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    /* Marp with inlineSVG renders <svg> inside each <section>.
       We hide all sections then show the active one scaled to fill. */
    #marp-container > section,
    #marp-container > svg {
      display: none;
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
    }

    #marp-container > section.active,
    #marp-container > svg.active {
      display: block;
    }

    /* Scale Marp's internal SVG to fill viewport */
    #marp-container > section.active > svg,
    #marp-container > svg.active {
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Slide Transitions ── */

    @keyframes t-fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes t-slide-right {
      from { opacity: 0; transform: translateX(80px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes t-slide-left {
      from { opacity: 0; transform: translateX(-80px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes t-slide-up {
      from { opacity: 0; transform: translateY(60px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes t-scale {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes t-flip {
      from { opacity: 0; transform: perspective(1200px) rotateY(90deg); }
      to { opacity: 1; transform: perspective(1200px) rotateY(0); }
    }
    @keyframes t-zoom {
      from { opacity: 0; transform: scale(1.3); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes t-drop {
      from { opacity: 0; transform: translateY(-80px) scale(0.9); }
      50% { opacity: 1; transform: translateY(8px) scale(1.02); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes t-rotate {
      from { opacity: 0; transform: rotate(-8deg) scale(0.9); }
      to { opacity: 1; transform: rotate(0) scale(1); }
    }

    /* Apply transition to active slide based on container's data-transition */
    [data-transition="fade"] > .active { animation: t-fade 0.5s ease-out both; }
    [data-transition="slide"] > .active { animation: t-slide-right 0.5s var(--spring) both; }
    [data-transition="slide-back"] > .active { animation: t-slide-left 0.5s var(--spring) both; }
    [data-transition="push"] > .active { animation: t-slide-up 0.5s var(--spring) both; }
    [data-transition="scale"] > .active { animation: t-scale 0.5s var(--spring) both; }
    [data-transition="flip"] > .active { animation: t-flip 0.6s var(--spring) both; }
    [data-transition="zoom"] > .active { animation: t-zoom 0.5s var(--spring) both; }
    [data-transition="drop"] > .active { animation: t-drop 0.6s var(--spring) both; }
    [data-transition="rotate"] > .active { animation: t-rotate 0.5s var(--spring) both; }
    [data-transition="none"] > .active { animation: none; }

    /* ── Element Build Animations ── */

    @keyframes el-fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes el-slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes el-slide-right { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes el-scale { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    @keyframes el-flip { from { opacity: 0; transform: perspective(600px) rotateX(90deg); } to { opacity: 1; transform: perspective(600px) rotateX(0); } }
    @keyframes el-typewriter { from { max-width: 0; } to { max-width: 100%; } }

    /* Element animations applied via data attributes in Marp markdown HTML comments */
    [data-build="fade"] { animation: el-fade-in 0.4s ease-out both; }
    [data-build="slide-up"] { animation: el-slide-up 0.4s var(--spring) both; }
    [data-build="slide-right"] { animation: el-slide-right 0.4s var(--spring) both; }
    [data-build="scale"] { animation: el-scale 0.4s var(--spring) both; }
    [data-build="flip"] { animation: el-flip 0.5s var(--spring) both; }

    /* Stagger children of elements marked with data-stagger */
    [data-stagger] > * { animation: el-slide-up 0.35s var(--spring) both; }
    [data-stagger] > *:nth-child(1) { animation-delay: 0s; }
    [data-stagger] > *:nth-child(2) { animation-delay: 0.08s; }
    [data-stagger] > *:nth-child(3) { animation-delay: 0.16s; }
    [data-stagger] > *:nth-child(4) { animation-delay: 0.24s; }
    [data-stagger] > *:nth-child(5) { animation-delay: 0.32s; }
    [data-stagger] > *:nth-child(6) { animation-delay: 0.40s; }
    [data-stagger] > *:nth-child(n+7) { animation-delay: 0.48s; }

    /* ── Controls Bar ── */

    .controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 12px;
      padding: 80px 20px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 50%, transparent);
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .controls:hover,
    .controls:focus-within {
      opacity: 1;
    }

    .ctrl-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--line);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      padding: 7px 14px;
      border-radius: 8px;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .ctrl-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .ctrl-btn:disabled { opacity: 0.25; cursor: default; transform: none; }
    .ctrl-btn.active { background: rgba(103,199,255,0.2); border-color: rgba(103,199,255,0.4); }

    .ctrl-select {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .ctrl-select option { background: #1a1e2e; }

    .ctrl-divider {
      width: 1px;
      height: 24px;
      background: var(--line);
      flex-shrink: 0;
    }

    .progress {
      font-size: 13px;
      color: var(--muted);
      min-width: 55px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    /* ── Title Bar ── */

    .title-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      padding: 10px 20px 60px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: flex-start;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.3s ease;
      background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
    }

    .title-bar:hover { opacity: 1; }

    .ai-dot {
      width: 6px; height: 6px;
      background: var(--ai-accent);
      border-radius: 50%;
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(103,199,255,0.5); }
      70% { box-shadow: 0 0 0 6px rgba(103,199,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(103,199,255,0); }
    }

    /* ── Fullscreen ── */
    body:fullscreen .controls, body:fullscreen .title-bar { opacity: 0; }
    body:fullscreen .controls:hover, body:fullscreen .title-bar:hover { opacity: 1; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <div class="title-bar">
    <div class="ai-dot"></div>
    <span id="deck-name">Slides</span>
  </div>

  <div id="marp-container"></div>

  <div class="controls">
    <button class="ctrl-btn" id="prev-btn" disabled>◀</button>
    <span class="progress" id="progress">0 / 0</span>
    <button class="ctrl-btn" id="next-btn" disabled>▶</button>

    <div class="ctrl-divider"></div>

    <select class="ctrl-select" id="transition-select" title="Slide transition">
      <option value="fade">Fade</option>
      <option value="slide">Slide</option>
      <option value="push">Push Up</option>
      <option value="scale">Scale</option>
      <option value="flip">Flip</option>
      <option value="zoom">Zoom</option>
      <option value="drop">Drop</option>
      <option value="rotate">Rotate</option>
      <option value="none">None</option>
    </select>

    <div class="ctrl-divider"></div>

    <button class="ctrl-btn" id="fs-btn" title="Fullscreen (F)">⛶</button>
  </div>

  <script>
    const slidesApp = window["slides"];
    let currentIdx = 0;
    let totalSlides = 0;
    let prevIdx = -1;

    // Per-slide transition map: slideIndex → transitionName
    // Stored in markdown via HTML comments: <!-- transition: flip -->
    const slideTransitions = {};
    let globalTransition = "fade";

    // ── Core ──

    function getTransitionForSlide(idx) {
      return slideTransitions[idx] || globalTransition;
    }

    let firstRender = true;

    function updateSlide() {
      const container = document.getElementById("marp-container");
      const children = container.querySelectorAll(":scope > section, :scope > svg");

      // No transition on first render — show immediately without flicker
      if (firstRender) {
        firstRender = false;
        container.setAttribute("data-transition", "none");
        children.forEach((s, i) => {
          s.classList.toggle("active", i === currentIdx);
        });
        prevIdx = currentIdx;
        document.getElementById("progress").textContent = `${currentIdx + 1} / ${children.length}`;
        document.getElementById("prev-btn").disabled = currentIdx === 0;
        document.getElementById("next-btn").disabled = currentIdx >= children.length - 1;
        document.getElementById("transition-select").value = getTransitionForSlide(currentIdx);
        return;
      }

      // Determine transition for slide changes
      let transition = "fade";
      if (prevIdx >= 0 && prevIdx !== currentIdx) {
        transition = getTransitionForSlide(currentIdx);
        if (transition === "slide" && currentIdx < prevIdx) {
          transition = "slide-back";
        }
      }

      // Set transition BEFORE activating the slide to avoid opacity:0 flash
      container.setAttribute("data-transition", transition);
      // Force animation restart by briefly removing active, then re-adding
      const prevActive = container.querySelector(".active");
      if (prevActive) prevActive.classList.remove("active");
      void container.offsetHeight;
      children.forEach((s, i) => {
        s.classList.toggle("active", i === currentIdx);
      });

      prevIdx = currentIdx;
      document.getElementById("progress").textContent = `${currentIdx + 1} / ${totalSlides}`;
      document.getElementById("prev-btn").disabled = currentIdx === 0;
      document.getElementById("next-btn").disabled = currentIdx >= totalSlides - 1;

      // Update transition dropdown to show current slide's transition
      document.getElementById("transition-select").value = getTransitionForSlide(currentIdx);
    }

    function parseMCP(raw) {
      if (raw && raw.content && Array.isArray(raw.content)) {
        const item = raw.content.find(c => c.type === "text" && c.text);
        if (item) {
          try { return JSON.parse(item.text); } catch { return item.text; }
        }
      }
      return raw;
    }

    function parseSlideTransitions() {
      // Extract <!-- transition: xxx --> from each slide's HTML
      const container = document.getElementById("marp-container");
      const children = container.querySelectorAll(":scope > section, :scope > svg");
      children.forEach((section, i) => {
        const html = section.innerHTML;
        const match = html.match(/<!--\s*transition:\s*(\w+)\s*-->/);
        if (match) {
          slideTransitions[i] = match[1];
        }
      });
    }

    function handleRender(data) {
      const container = document.getElementById("marp-container");
      container.innerHTML = data.html || "";
      document.getElementById("marp-style").innerHTML = data.css || "";

      // Count slides (sections or top-level SVGs)
      const children = container.querySelectorAll(":scope > section, :scope > svg");
      totalSlides = children.length;
      currentIdx = data.current || 0;
      prevIdx = -1;

      // Parse per-slide transitions from HTML comments
      parseSlideTransitions();

      updateSlide();
    }

    function handleData(data) {
      if (!data) return;
      if (data.type === "render" || (data.html && data.css)) {
        handleRender(data);
      } else if (data.type === "nav" || typeof data.index === "number") {
        const oldIdx = currentIdx;
        currentIdx = data.index;
        prevIdx = oldIdx;
        updateSlide();
      }
    }

    // ── Controls ──

    document.getElementById("prev-btn").addEventListener("click", async () => {
      if (slidesApp) {
        handleData(parseMCP(await slidesApp.previous()));
      } else if (currentIdx > 0) {
        prevIdx = currentIdx;
        currentIdx--;
        updateSlide();
      }
    });

    document.getElementById("next-btn").addEventListener("click", async () => {
      if (slidesApp) {
        handleData(parseMCP(await slidesApp.next()));
      } else if (currentIdx < totalSlides - 1) {
        prevIdx = currentIdx;
        currentIdx++;
        updateSlide();
      }
    });

    document.getElementById("transition-select").addEventListener("change", (e) => {
      const value = e.target.value;
      // Set transition for current slide
      slideTransitions[currentIdx] = value;
      globalTransition = value;
    });

    document.getElementById("fs-btn").addEventListener("click", () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.body.requestFullscreen();
      }
    });

    // ── Keyboard ──

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") {
        e.preventDefault();
        document.getElementById("next-btn").click();
      }
      if (e.key === "ArrowLeft" || e.key === "PageUp") {
        e.preventDefault();
        document.getElementById("prev-btn").click();
      }
      if (e.key === "f" || e.key === "F") {
        document.getElementById("fs-btn").click();
      }
      if (e.key === "Home") {
        if (slidesApp) slidesApp.go({ index: 0 }).then(r => handleData(parseMCP(r)));
      }
      if (e.key === "End") {
        if (slidesApp) slidesApp.go({ index: totalSlides - 1 }).then(r => handleData(parseMCP(r)));
      }
    });

    // ── Bridge ──

    if (slidesApp) {
      window.photon?.onResult?.((result) => {
        handleData(parseMCP(result));
      });

      window.photon?.onEmit?.((event) => {
        const name = event?.event;
        if (name === "slideChanged" || name === "deckChanged") {
          slidesApp.main().then(r => handleData(parseMCP(r)));
        }
      });

      slidesApp.main().then(r => handleData(parseMCP(r)));
    }
  </script>
</body>
</html>
