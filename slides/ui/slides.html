<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slides</title>
  <style id="marp-style"></style>
  <style>
    :root {
      --accent: #67c7ff;
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2035;
      --line: rgba(255,255,255,0.1);
      --text: #e5e5e5;
      --muted: rgba(255,255,255,0.45);
      --spring: cubic-bezier(0.16, 1, 0.3, 1);
      --filmstrip-w: 180px;
      --toolbar-h: 44px;
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════════
       TOOLBAR
       ══════════════════════════════════════════ */

    .toolbar {
      height: var(--toolbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
      z-index: 100;
    }

    .toolbar .deck-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-right: auto;
    }

    .toolbar .ai-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2.5s infinite;
    }

    .tb-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 6px;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .tb-btn:hover { background: rgba(255,255,255,0.12); }
    .tb-btn.primary { background: rgba(103,199,255,0.15); border-color: rgba(103,199,255,0.3); color: var(--accent); }
    .tb-btn.primary:hover { background: rgba(103,199,255,0.25); }
    .tb-btn:disabled { opacity: 0.3; cursor: default; }

    .tb-select {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
    }
    .tb-select option { background: var(--surface); }

    .tb-sep { width: 1px; height: 20px; background: var(--line); flex-shrink: 0; }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(103,199,255,0.5); }
      70% { box-shadow: 0 0 0 6px rgba(103,199,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(103,199,255,0); }
    }

    /* ══════════════════════════════════════════
       AUTHORING LAYOUT
       ══════════════════════════════════════════ */

    .authoring {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Filmstrip ── */

    .filmstrip {
      width: var(--filmstrip-w);
      background: var(--surface);
      border-right: 1px solid var(--line);
      overflow-y: auto;
      flex-shrink: 0;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filmstrip::-webkit-scrollbar { width: 4px; }
    .filmstrip::-webkit-scrollbar-track { background: transparent; }
    .filmstrip::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .thumb {
      position: relative;
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      overflow: hidden;
      background: white;
      aspect-ratio: 16/9;
      transition: border-color 0.15s;
    }

    .thumb:hover { border-color: rgba(255,255,255,0.3); }
    .thumb.selected { border-color: var(--accent); }

    .thumb-num {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 9px;
      color: var(--muted);
      background: rgba(0,0,0,0.6);
      padding: 1px 4px;
      border-radius: 3px;
    }

    .thumb-inner {
      width: 960px;
      height: 540px;
      transform: scale(var(--thumb-scale, 0.16));
      transform-origin: top left;
      pointer-events: none;
      overflow: hidden;
    }

    .thumb-inner section,
    .thumb-inner svg {
      width: 960px !important;
      height: 540px !important;
    }

    /* ── Deck Picker Overlay ── */

    .deck-picker {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    .deck-picker.hidden { display: none; }

    .deck-picker h2 {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--text);
    }

    .deck-picker .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-top: -12px;
    }

    .deck-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      max-width: 700px;
      width: 100%;
      padding: 0 24px;
      max-height: 50vh;
      overflow-y: auto;
    }

    .deck-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }

    .deck-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .deck-card .deck-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .deck-card .deck-date {
      font-size: 11px;
      color: var(--muted);
    }

    .deck-create {
      display: flex;
      gap: 8px;
      max-width: 400px;
      width: 100%;
      padding: 0 24px;
    }

    .deck-create input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .deck-create input:focus { border-color: var(--accent); }
    .deck-create input::placeholder { color: var(--muted); }

    /* ── Main Area ── */

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Slide Preview ── */

    .preview-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      background: var(--bg);
    }

    .preview-frame {
      background: white;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      overflow: hidden;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 16/9;
      position: relative;
    }

    .preview-frame section,
    .preview-frame svg {
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Editor Panel ── */

    .editor-panel {
      height: 200px;
      background: var(--surface);
      border-top: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .editor-header {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }

    .editor-header span { font-weight: 600; }

    .editor-textarea {
      flex: 1;
      background: var(--surface2);
      color: var(--text);
      border: none;
      padding: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: none;
      outline: none;
      tab-size: 2;
    }

    .editor-textarea::placeholder { color: var(--muted); }

    /* ── Resize Handle ── */

    .resize-handle {
      height: 4px;
      background: var(--line);
      cursor: row-resize;
      flex-shrink: 0;
    }

    .resize-handle:hover { background: var(--accent); }

    /* ══════════════════════════════════════════
       PRESENTATION MODE (fullscreen)
       ══════════════════════════════════════════ */

    .present-mode {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: black;
    }

    .present-mode.active { display: block; }

    .present-mode #present-container {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .present-mode #present-container > section,
    .present-mode #present-container > svg {
      display: none;
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
    }

    .present-mode #present-container > section.active,
    .present-mode #present-container > svg.active {
      display: block;
    }

    .present-mode #present-container > section.active > svg,
    .present-mode #present-container > svg.active {
      width: 100% !important;
      height: 100% !important;
    }

    .present-controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1001;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 12px;
      padding: 60px 20px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .present-controls:hover { opacity: 1; }

    .present-progress {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      font-variant-numeric: tabular-nums;
    }

    /* ── Transitions (presentation mode only) ── */

    @keyframes t-fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes t-slide-r { from { opacity:0; transform:translateX(80px); } to { opacity:1; transform:translateX(0); } }
    @keyframes t-slide-l { from { opacity:0; transform:translateX(-80px); } to { opacity:1; transform:translateX(0); } }
    @keyframes t-scale { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }
    @keyframes t-zoom { from { opacity:0; transform:scale(1.3); } to { opacity:1; transform:scale(1); } }

    [data-transition="fade"] > .active { animation: t-fade 0.4s ease-out both; }
    [data-transition="slide"] > .active { animation: t-slide-r 0.4s var(--spring) both; }
    [data-transition="slide-back"] > .active { animation: t-slide-l 0.4s var(--spring) both; }
    [data-transition="scale"] > .active { animation: t-scale 0.4s var(--spring) both; }
    [data-transition="zoom"] > .active { animation: t-zoom 0.4s var(--spring) both; }
    [data-transition="none"] > .active { animation: none; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- ══ Deck Picker ══ -->
  <div class="deck-picker" id="deck-picker">
    <h2>Slides</h2>
    <p class="subtitle">Choose a deck or create a new one</p>
    <div class="deck-grid" id="deck-grid"></div>
    <div class="deck-create">
      <input type="text" id="new-deck-name" placeholder="New deck name..." />
      <button class="tb-btn primary" id="create-deck-btn">Create</button>
    </div>
  </div>

  <!-- ══ Toolbar ══ -->
  <div class="toolbar">
    <div class="ai-dot"></div>
    <span class="deck-name" id="deck-name">Slides</span>

    <button class="tb-btn" id="decks-btn" title="Switch deck">📂 Decks</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="add-btn" title="Add slide">+ Add</button>
    <button class="tb-btn" id="dup-btn" title="Duplicate slide">Duplicate</button>
    <button class="tb-btn" id="del-btn" title="Delete slide">Delete</button>

    <div class="tb-sep"></div>

    <select class="tb-select" id="transition-select" title="Slide transition">
      <option value="fade">Fade</option>
      <option value="slide">Slide</option>
      <option value="scale">Scale</option>
      <option value="zoom">Zoom</option>
      <option value="none">None</option>
    </select>

    <div class="tb-sep"></div>

    <button class="tb-btn primary" id="present-btn">▶ Present</button>
  </div>

  <!-- ══ Authoring View ══ -->
  <div class="authoring">
    <div class="filmstrip" id="filmstrip"></div>
    <div class="main-area">
      <div class="preview-container">
        <div class="preview-frame" id="preview-frame"></div>
      </div>
      <div class="resize-handle" id="resize-handle"></div>
      <div class="editor-panel" id="editor-panel">
        <div class="editor-header">
          <span>Slide <span id="editor-slide-num">1</span></span>
          <span style="margin-left:auto;font-size:11px;color:var(--muted)">Markdown</span>
        </div>
        <textarea class="editor-textarea" id="editor" placeholder="Write slide content in Markdown..."></textarea>
      </div>
    </div>
  </div>

  <!-- ══ Presentation Mode (overlay) ══ -->
  <div class="present-mode" id="present-mode">
    <div id="present-container" data-transition="none"></div>
    <div class="present-controls">
      <button class="tb-btn" id="present-prev">◀</button>
      <span class="present-progress" id="present-progress">1 / 1</span>
      <button class="tb-btn" id="present-next">▶</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="present-exit">✕ Exit</button>
    </div>
  </div>

  <script>
    const slidesApp = window["slides"];
    let slides = [];        // Array of { html, markdown, transition }
    let currentIdx = 0;
    let marpCSS = "";
    let editorDirty = false;
    let saveTimeout = null;

    // ── Parse MCP response ──

    function parseMCP(raw) {
      if (raw && raw.content && Array.isArray(raw.content)) {
        const item = raw.content.find(c => c.type === "text" && c.text);
        if (item) {
          try { return JSON.parse(item.text); } catch { return item.text; }
        }
      }
      return raw;
    }

    // ── Render from server data ──

    function handleData(data) {
      if (!data) return;
      if (data.type === "render" || (data.html && data.css)) {
        loadDeck(data);
      } else if (data.type === "nav" || typeof data.index === "number") {
        selectSlide(data.index);
      }
    }

    function loadDeck(data) {
      marpCSS = data.css || "";
      document.getElementById("marp-style").innerHTML = marpCSS;

      // Parse HTML into individual slides
      const tmp = document.createElement("div");
      tmp.innerHTML = data.html || "";
      const sections = tmp.querySelectorAll(":scope > section, :scope > svg");

      slides = [];
      sections.forEach((el, i) => {
        const transMatch = el.innerHTML.match(/<!--\s*transition:\s*(\w+)\s*-->/);
        slides.push({
          html: el.outerHTML,
          markdown: data.slideMarkdowns?.[i] || "",
          transition: transMatch ? transMatch[1] : "fade",
        });
      });

      currentIdx = Math.min(data.current || 0, slides.length - 1);
      renderFilmstrip();
      selectSlide(currentIdx);
    }

    // ── Filmstrip ──

    function renderFilmstrip() {
      const strip = document.getElementById("filmstrip");
      strip.innerHTML = "";
      const thumbW = 180 - 20; // padding
      const scale = thumbW / 960;

      slides.forEach((slide, i) => {
        const thumb = document.createElement("div");
        thumb.className = "thumb" + (i === currentIdx ? " selected" : "");
        thumb.onclick = () => selectSlide(i);

        const inner = document.createElement("div");
        inner.className = "thumb-inner";
        inner.style.setProperty("--thumb-scale", scale);
        inner.innerHTML = slide.html;

        // Apply marp CSS to thumbnails
        const style = document.createElement("style");
        style.textContent = marpCSS;
        inner.prepend(style);

        const num = document.createElement("div");
        num.className = "thumb-num";
        num.textContent = i + 1;

        thumb.appendChild(inner);
        thumb.appendChild(num);
        strip.appendChild(thumb);
      });
    }

    // ── Slide Selection ──

    function selectSlide(idx) {
      // Save current editor content if dirty
      if (editorDirty && slides[currentIdx]) {
        saveCurrentSlide();
      }

      currentIdx = Math.max(0, Math.min(idx, slides.length - 1));

      // Update filmstrip selection
      document.querySelectorAll(".thumb").forEach((t, i) => {
        t.classList.toggle("selected", i === currentIdx);
      });

      // Scroll selected thumb into view
      const selected = document.querySelector(".thumb.selected");
      if (selected) selected.scrollIntoView({ block: "nearest" });

      // Update preview
      const preview = document.getElementById("preview-frame");
      if (slides[currentIdx]) {
        preview.innerHTML = slides[currentIdx].html;
      }

      // Update editor
      const editor = document.getElementById("editor");
      editor.value = slides[currentIdx]?.markdown || "";
      editorDirty = false;
      document.getElementById("editor-slide-num").textContent = currentIdx + 1;

      // Update transition dropdown
      document.getElementById("transition-select").value = slides[currentIdx]?.transition || "fade";
    }

    // ── Editor ──

    function saveCurrentSlide() {
      if (!slides[currentIdx]) return;
      const editor = document.getElementById("editor");
      const newMarkdown = editor.value;
      if (newMarkdown === slides[currentIdx].markdown) return;

      slides[currentIdx].markdown = newMarkdown;
      editorDirty = false;

      // Send to server
      if (slidesApp) {
        slidesApp.edit({ index: currentIdx, markdown: newMarkdown }).then(r => {
          const data = parseMCP(r);
          if (data && data.html) {
            // Refresh just this slide's HTML
            const tmp = document.createElement("div");
            tmp.innerHTML = data.html || "";
            const sections = tmp.querySelectorAll(":scope > section, :scope > svg");
            if (sections[currentIdx]) {
              slides[currentIdx].html = sections[currentIdx].outerHTML;
              document.getElementById("preview-frame").innerHTML = slides[currentIdx].html;
              renderFilmstrip();
            }
          }
        });
      }
    }

    document.getElementById("editor").addEventListener("input", () => {
      editorDirty = true;
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveCurrentSlide, 800);
    });

    // ── Toolbar Actions ──

    document.getElementById("add-btn").addEventListener("click", async () => {
      if (slidesApp) {
        const r = parseMCP(await slidesApp.add({ content: "# New Slide\n\nContent here", index: currentIdx + 1 }));
        if (r && r.html) loadDeck(r);
        selectSlide(currentIdx + 1);
      }
    });

    document.getElementById("dup-btn").addEventListener("click", async () => {
      if (slidesApp) {
        const r = parseMCP(await slidesApp.duplicate({ index: currentIdx }));
        if (r && r.html) loadDeck(r);
        selectSlide(currentIdx + 1);
      }
    });

    document.getElementById("del-btn").addEventListener("click", async () => {
      if (slides.length <= 1) return;
      if (slidesApp) {
        const r = parseMCP(await slidesApp.remove({ index: currentIdx }));
        if (r && r.html) loadDeck(r);
        selectSlide(Math.min(currentIdx, slides.length - 1));
      }
    });

    document.getElementById("decks-btn").addEventListener("click", () => {
      showDeckPicker();
    });

    document.getElementById("transition-select").addEventListener("change", (e) => {
      if (slides[currentIdx]) {
        slides[currentIdx].transition = e.target.value;
      }
    });

    // ── Presentation Mode ──

    let presentIdx = 0;

    document.getElementById("present-btn").addEventListener("click", () => {
      enterPresentation();
    });

    document.getElementById("present-exit").addEventListener("click", () => {
      exitPresentation();
    });

    function enterPresentation() {
      const mode = document.getElementById("present-mode");
      const container = document.getElementById("present-container");
      container.innerHTML = slides.map(s => s.html).join("");
      container.setAttribute("data-transition", "none");

      presentIdx = currentIdx;
      const children = container.querySelectorAll(":scope > section, :scope > svg");
      children.forEach((s, i) => s.classList.toggle("active", i === presentIdx));

      document.getElementById("present-progress").textContent = `${presentIdx + 1} / ${slides.length}`;
      mode.classList.add("active");

      // Try fullscreen
      document.body.requestFullscreen?.().catch(() => {});
    }

    function exitPresentation() {
      document.getElementById("present-mode").classList.remove("active");
      if (document.fullscreenElement) document.exitFullscreen();
      selectSlide(presentIdx);
    }

    function presentNav(dir) {
      const container = document.getElementById("present-container");
      const children = container.querySelectorAll(":scope > section, :scope > svg");
      const newIdx = presentIdx + dir;
      if (newIdx < 0 || newIdx >= children.length) return;

      const transition = slides[newIdx]?.transition || "fade";
      container.setAttribute("data-transition", dir > 0 ? transition : (transition === "slide" ? "slide-back" : transition));
      const prev = container.querySelector(".active");
      if (prev) prev.classList.remove("active");
      void container.offsetHeight;
      presentIdx = newIdx;
      children[presentIdx].classList.add("active");
      document.getElementById("present-progress").textContent = `${presentIdx + 1} / ${slides.length}`;
    }

    document.getElementById("present-prev").addEventListener("click", () => presentNav(-1));
    document.getElementById("present-next").addEventListener("click", () => presentNav(1));

    // ── Editor Resize ──

    const resizeHandle = document.getElementById("resize-handle");
    let resizing = false;

    resizeHandle.addEventListener("mousedown", (e) => {
      resizing = true;
      e.preventDefault();
    });

    window.addEventListener("mousemove", (e) => {
      if (!resizing) return;
      const panel = document.getElementById("editor-panel");
      const rect = document.querySelector(".authoring").getBoundingClientRect();
      const newHeight = rect.bottom - e.clientY;
      panel.style.height = Math.max(80, Math.min(newHeight, rect.height - 100)) + "px";
    });

    window.addEventListener("mouseup", () => { resizing = false; });

    // ── Keyboard ──

    window.addEventListener("keydown", (e) => {
      const presenting = document.getElementById("present-mode").classList.contains("active");
      const inEditor = document.activeElement === document.getElementById("editor");

      if (presenting) {
        if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") {
          e.preventDefault(); presentNav(1);
        } else if (e.key === "ArrowLeft" || e.key === "PageUp") {
          e.preventDefault(); presentNav(-1);
        } else if (e.key === "Escape") {
          exitPresentation();
        }
        return;
      }

      // Authoring shortcuts (not when typing in editor)
      if (!inEditor) {
        if (e.key === "ArrowDown" || e.key === "ArrowRight") {
          e.preventDefault();
          selectSlide(currentIdx + 1);
        } else if (e.key === "ArrowUp" || e.key === "ArrowLeft") {
          e.preventDefault();
          selectSlide(currentIdx - 1);
        } else if (e.key === "Enter" || e.key === "p") {
          enterPresentation();
        }
      }

      // Cmd+S to save
      if ((e.metaKey || e.ctrlKey) && e.key === "s") {
        e.preventDefault();
        saveCurrentSlide();
      }
    });

    // ── Fullscreen exit → back to authoring ──
    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement && document.getElementById("present-mode").classList.contains("active")) {
        exitPresentation();
      }
    });

    // ── Deck Picker ──

    let deckLoaded = false;

    function showDeckPicker() {
      document.getElementById("deck-picker").classList.remove("hidden");
      if (slidesApp) {
        slidesApp.list().then(r => {
          const data = parseMCP(r);
          const grid = document.getElementById("deck-grid");
          const decks = data?.decks || [];

          if (decks.length === 0) {
            grid.innerHTML = '<p style="color:var(--muted);text-align:center;grid-column:1/-1;">No decks yet. Create one below.</p>';
          } else {
            grid.innerHTML = decks.map(d => `
              <div class="deck-card" data-file="${d.file}">
                <div class="deck-title">${d.title || d.file}</div>
                <div class="deck-date">${d.updatedAt ? new Date(d.updatedAt).toLocaleDateString() : ''}</div>
              </div>
            `).join('');

            grid.querySelectorAll(".deck-card").forEach(card => {
              card.addEventListener("click", () => {
                const file = card.dataset.file;
                const instance = file.replace(/\.md$/i, '');
                openDeck(instance);
              });
            });
          }
        });
      }
    }

    function hideDeckPicker() {
      document.getElementById("deck-picker").classList.add("hidden");
    }

    async function openDeck(instance) {
      if (!slidesApp) return;
      // Use _use to switch instance, then load
      try {
        await slidesApp._use?.({ name: instance });
      } catch { /* _use may not exist as callable */ }
      const r = parseMCP(await slidesApp.main());
      handleData(r);
      deckLoaded = true;
      hideDeckPicker();
      document.getElementById("deck-name").textContent = instance;
    }

    document.getElementById("create-deck-btn").addEventListener("click", () => {
      const input = document.getElementById("new-deck-name");
      const name = input.value.trim();
      if (!name) return;
      openDeck(name);
      input.value = '';
    });

    document.getElementById("new-deck-name").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("create-deck-btn").click();
    });

    // ── Bridge ──

    if (slidesApp) {
      window.photon?.onResult?.((result) => {
        handleData(parseMCP(result));
      });

      window.photon?.onEmit?.((event) => {
        const name = event?.event;
        if (name === "slideChanged" || name === "deckChanged") {
          slidesApp.main().then(r => handleData(parseMCP(r)));
        }
      });

      // Check if there's a loaded deck already (instance was set)
      slidesApp.main().then(r => {
        const data = parseMCP(r);
        if (data && data.html && data.html.trim()) {
          // Deck already loaded (instance was picked)
          handleData(data);
          deckLoaded = true;
          hideDeckPicker();
        } else {
          // No content — show deck picker
          showDeckPicker();
        }
      }).catch(() => {
        showDeckPicker();
      });
    }
  </script>
</body>
</html>
