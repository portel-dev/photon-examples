<!--
  Render Showcase Dashboard (Declarative)

  Zero JavaScript. Each data-method auto-resolves:
  - Format from the method's @format tag (gauge, table, chart:bar, etc.)
  - Trigger from element type (div → load)
  - Theme from the bridge (light/dark adapts automatically)
-->

<style>
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--muted, #888); margin-bottom: 20px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 16px;
  }

  .wide { grid-column: span 2; }
  .gauge-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }

  @media (max-width: 720px) {
    .wide { grid-column: span 1; }
  }
</style>

<h1>Render Showcase</h1>
<p class="subtitle">Declarative dashboard — zero JavaScript, all formats auto-inferred from @format tags</p>

<div class="grid">
  <!-- Each div just needs data-method. Format comes from @format on the photon method. -->
  <div data-method="activeUsers"></div>
  <div data-method="deployment"></div>

  <div class="wide">
    <div class="gauge-row">
      <div data-method="cpu"></div>
      <div data-method="memory"></div>
    </div>
  </div>

  <div class="wide" data-method="revenue"></div>
  <div class="wide" data-method="temperature"></div>
  <div class="wide" data-method="users"></div>

  <div data-method="activity"></div>
  <div data-method="team"></div>
  <div data-method="config"></div>
  <div data-method="changelog"></div>
  <div class="wide" data-method="services"></div>
</div>
